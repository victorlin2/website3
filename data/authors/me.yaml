bio: |
  I am a Basic Life Research Scientist at Stanford University School of Medicine. My research
  has primarily focused on mass spectrometry and metabolomics, with applications in both 
  biomedical research and environmental health. I am particularly interested in leveraging 
  these technologies to investigate the molecular mechanisms underlying diseases and to
  assess the effects of environmental exposures on human health.

